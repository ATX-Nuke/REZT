    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        #volume-control {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #volume-control input { cursor: pointer; }
        audio { display: none; }

        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .enter-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 60%, 100% { transform: scale(1); }
            15%, 45% { transform: scale(1.15); }
        }

        #profile-screen {
            display: none;
            opacity: 0;
            width: 100%;
            padding: 20px;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .profile-card {
            background-color: #ffffff;
            color: #000000;
            width: 95%;
            max-width: 800px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.6);
            border: 3px solid #00a2ff;
            display: flex;
            flex-direction: column;
            transform: translateY(30px);
            transition: transform 0.4s ease;
        }

        .card-header-gif {
            width: 100%;
            height: 150px;
            background-image: url('https://i.pinimg.com/originals/b0/59/9e/b0599edde0a1562995ebcd44c1e815be.gif');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid #00a2ff;
        }

        .card-body {
            display: flex;
            flex-direction: row;
        }

        .card-left {
            width: 240px;
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            border-right: 1px solid #eee;
        }

        .card-right {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 20px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .sticky-note {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background-color: #000;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            transform: rotate(5deg);
            font-size: 14px;
        }

        .name-section {
            margin-bottom: 15px;
        }

        .name {
            font-size: 26px;
            font-weight: 800;
            color: #000;
        }

        .founder-tag {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .bio {
            font-size: 14px;
            line-height: 1.5;
            color: #444;
            font-style: italic;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 3px solid #ddd;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #f1f1f1;
            padding: 12px;
            border-radius: 12px;
        }

        .info-label {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            display: block;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #222;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #00a2ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            transition: 0.3s;
            filter: grayscale(100%);
        }

        .social-btn:hover {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        .social-btn img {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .web-links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .web-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .web-btn:hover {
            background: #111111;
            transform: translateY(-2px);
            border-color: #00a2ff;
            box-shadow: 0 5px 15px rgba(0, 162, 255, 0.3);
        }

        .show-card { transform: translateY(0); }

        @media (max-width: 650px) {
            .card-body { flex-direction: column; }
            .profile-card { height: auto; overflow-y: auto; max-height: 90vh; }
            .card-left { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
            .info-grid { grid-template-columns: 1fr; }
            .card-header-gif { height: 100px; }
        }
    </style>
</head>
