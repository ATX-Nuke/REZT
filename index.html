<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小堅果ღ𝑅𝑒𝑧𝑡ღ</title>

    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/1200x/d6/9d/ab/d69dab27da95cdd1e61007ae3e31a43c.jpg">

    <meta property="og:title" content="小堅果ღ𝑅𝑒𝑧𝑡ღ | Vy Hub Founder" />
    <meta property="og:description" content="Official profile of Rezt. Coder & Founder of Vy Hub. Exploring the boundaries of code and creativity." />
    <meta property="og:image" content="https://i.pinimg.com/1200x/d6/9d/ab/d69dab27da95cdd1e61007ae3e31a43c.jpg" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#ffffff">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        audio {
            display: none;
        }

        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .enter-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 30px;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            animation: heartbeat 1.5s infinite;
        }

        .enter-btn:hover {
            background-color: #ffffff;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        #profile-screen {
            display: none;
            opacity: 0;
            width: 100%;
            padding: 20px;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .profile-card {
            background-color: #ffffff;
            color: #000000;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(30px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-card:hover {
            transform: scale(1.05);
        }

        .banner {
            width: 100%;
            height: 140px;
            background-image: url('https://i.pinimg.com/originals/1f/ef/28/1fef28587d65c76c2c40093407aae79a.gif');
            background-size: cover;
            background-position: center;
        }

        .avatar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -55px;
            position: relative;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            object-fit: cover;
            background-color: #000000;
        }

        .sticky-note {
            position: absolute;
            background-color: #ffeb3b;
            color: #000000;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            transform: rotate(-10deg);
            margin-left: 130px; 
            margin-top: -30px; 
        }

        .info {
            text-align: center;
            padding: 15px 25px 0;
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .founder-text {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.6; }
            to { opacity: 1; text-shadow: 0 0 5px rgba(0,0,0,0.2); }
        }

        .location {
            font-size: 13px;
            color: #666;
            cursor: help;
            display: inline-block;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 14px;
            line-height: 1.6;
            color: #222;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            white-space: pre-line;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px 25px;
        }

        .social-btn {
            display: block;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            filter: grayscale(100%);
        }

        .social-btn:hover {
            transform: translateY(-5px);
            filter: grayscale(0%);
        }

        .social-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .show-card {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="https://cdn.discordapp.com/attachments/1494715909309333604/1496492960227791009/CENTRAL_CEE_FT._LIL_BABY_-_BAND4BAND_MUSIC_VIDEO.mp3?ex=69ea152d&is=69e8c3ad&hm=2fa5fa4d507d4cbb024bc025e82e36977b2c0c98cbc71533c4ab83a36764cd80&" type="audio/mpeg">
    </audio>

    <div id="intro-screen">
        <button class="enter-btn" id="enter-btn">❤️</button>
    </div>

    <div id="profile-screen">
        <div class="profile-card" id="profile-card">
            <div class="banner"></div>
            
            <div class="avatar-container">
                <img src="https://i.pinimg.com/1200x/d6/9d/ab/d69dab27da95cdd1e61007ae3e31a43c.jpg" alt="Avatar" class="avatar">
                <div class="sticky-note">67</div>
            </div>
            
            <div class="info">
                <h1 class="name">小堅果ღ𝑅𝑒𝑧𝑡ღ</h1>
                <div class="founder-text">Vy Hub Founder</div>
                <p class="location" title="居住地">📍 台灣</p>
                <div class="bio">Coder 14y
𝑊ℎ𝑦 𝑙𝑜𝑜𝑘 ℎ𝑒𝑟𝑒?
𝑇ℎ𝑒𝑟𝑒'𝑠 𝑛𝑜 𝑜𝑛𝑒 ℎ𝑒𝑟𝑒.
𝘐𝘵 𝘴𝘩𝘰𝘶𝘭𝘥 𝘣𝘦 𝘴𝘢𝘪𝘥 𝘵𝘩𝘢𝘵 𝘪𝘵 𝘥𝘰𝘦𝘴𝘯'𝘵 𝘦𝘹𝘪𝘴𝘵 𝘢𝘵 𝘢𝘭𝘭.</div>
            </div>
            
            <div class="social-links">
                <a href="https://discord.gg/pv5zduucEE" target="_blank" class="social-btn">
                    <img src="https://i.pinimg.com/webp80/736x/5b/da/c5/5bdac50e89b8ed4324a4a7a8f7eb1f77.webp" alt="Discord">
                </a>
                <a href="https://www.instagram.com/nike_.114514?igsh=dnNkM2hlZ2g3cGFk" target="_blank" class="social-btn">
                    <img src="https://i.pinimg.com/webp80/736x/ef/0e/81/ef0e8197c22b8d1563acacd2e0ef1b6a.webp" alt="Instagram">
                </a>
                <a href="https://vynuke.com/" target="_blank" class="social-btn">
                    <img src="https://i.pinimg.com/webp80/736x/72/23/b4/7223b408d9a4f738ced1a4786205bda8.webp" alt="VyNuke">
                </a>
            </div>
        </div>
    </div>

    <script>
        const enterBtn = document.getElementById('enter-btn');
        const introScreen = document.getElementById('intro-screen');
        const profileScreen = document.getElementById('profile-screen');
        const profileCard = document.getElementById('profile-card');
        const bgm = document.getElementById('bgm');

        enterBtn.addEventListener('click', () => {
            document.body.style.backgroundImage = "url('https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif')";
            
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log(e));

            introScreen.style.opacity = '0';
            
            setTimeout(() => {
                introScreen.style.display = 'none';
                profileScreen.style.display = 'flex';
                void profileScreen.offsetWidth;
                profileScreen.style.opacity = '1';
                profileCard.classList.add('show-card');
            }, 500);
        });
    </script>
</body>
</html>
