<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reztnutღ𝑅𝑒𝑧𝑡ღ</title>
    <meta property="og:title" content="Reztnutღ𝑅𝑒𝑧𝑡ღ">
    <meta property="og:description" content="Vy Hub Founder | Python & JavaScript Developer | 14y">
    <meta property="og:image" content="https://i.pinimg.com/736x/21/a9/97/21a9970c8845fb9b68fe7b6e3e86ca5a.jpg">
    <meta property="og:url" content="https://vynuke.com/">
    <meta name="theme-color" content="#000000">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Segoe UI', monospace;
        }

        body {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        #bgm { display: none; }

        #intro-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .enter-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .enter-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px #00a2ff;
        }

        #profile-screen {
            display: none;
            opacity: 0;
            width: 100%;
            padding: 20px;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .profile-card {
            background-color: #0a0a0a;
            color: #ffffff;
            width: 95%;
            max-width: 950px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 162, 255, 0.1);
            border: 1px solid rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .profile-card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 60px rgba(0, 162, 255, 0.3);
        }

        .card-header-gif {
            width: 100%;
            height: 150px;
            background-image: url('https://i.pinimg.com/originals/b0/59/9e/b0599edde0a1562995ebcd44c1e815be.gif');
            background-size: cover;
            background-position: center;
            border-radius: 24px 24px 0 0;
            opacity: 0.6;
        }

        .card-body { display: flex; flex-direction: row; }

        .card-left {
            width: 200px;
            background: rgba(15, 15, 15, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-main {
            flex: 1;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2);
        }

        .card-right-player {
            width: 220px;
            background: rgba(15, 15, 15, 0.5);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 0 24px 0;
        }

        .avatar-wrapper { position: relative; }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            border: 2px solid #00a2ff;
            object-fit: cover;
        }

        .vinyl-container {
            position: relative;
            width: 110px;
            height: 110px;
            background: repeating-radial-gradient(#111, #111 2px, #222 3px, #111 4px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .vinyl-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            animation: rotate 5s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-name { font-size: 11px; text-align: center; color: #888; margin-bottom: 15px; letter-spacing: 1px; }
        
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        .play-btn { cursor: pointer; font-size: 24px; transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.1); }

        .playback-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress { width: 0%; height: 100%; background: #00a2ff; border-radius: 2px; transition: width 0.1s linear; }

        .volume-box {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .volume-box input {
            flex: 1;
            accent-color: #00a2ff;
            height: 3px;
            cursor: pointer;
        }

        .name { font-size: 26px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(0,162,255,0.6); }
        .founder-tag { background: #00a2ff; color: #000; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 8px; display: inline-block; }
        .bio { font-size: 14px; color: #bbb; font-style: italic; margin: 25px 0; padding-left: 12px; border-left: 3px solid #00a2ff; line-height: 1.6; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-item { background: rgba(255, 255, 255, 0.04); padding: 12px; border-radius: 12px; border: 1px solid rgba(0, 162, 255, 0.1); }
        .info-label { font-size: 10px; color: #00a2ff; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .info-value { font-size: 14px; font-weight: bold; }

        .social-links {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 162, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: #00a2ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 850px) {
            .card-body { flex-direction: column; }
            .card-left, .card-right-player { width: 100%; border: none; border-radius: 0; }
            .card-right-player { border-top: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 24px 24px; }
            .profile-card:hover { transform: none; }
        }
    </style>
</head>
<body>
    <audio id="bgm" loop>
        <source src="https://files.catbox.moe/yahkuz.mp3">
    </audio>

    <div id="intro-screen">
        <button class="enter-btn" id="enter-btn">🤍</button>
    </div>

    <div id="profile-screen">
        <div class="profile-card">
            <div class="card-header-gif"></div>
            <div class="card-body">
                <div class="card-left">
                    <div class="avatar-wrapper">
                        <img src="https://i.pinimg.com/736x/21/a9/97/21a9970c8845fb9b68fe7b6e3e86ca5a.jpg" alt="Avatar" class="avatar">
                        <div style="position: absolute; bottom: -8px; right: -8px; background: #00a2ff; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px;">67</div>
                    </div>
                </div>

                <div class="card-main">
                    <div class="name-section">
                        <h1 class="name">Reztnutღ𝑅𝑒𝑧𝑡ღ</h1>
                        <span class="founder-tag">Vy Hub Founder</span>
                    </div>
                    <div class="bio">
                        "𝑊ℎ𝑦 𝑙𝑜𝑜𝑘 ℎ𝑒𝑟𝑒? There's no one here. It shouldn't be said that it doesn't exist at all."
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">Age</span><span class="info-value">14y</span></div>
                        <div class="info-item"><span class="info-label">Code</span><span class="info-value">Python, JS</span></div>
                        <div class="info-item"><span class="info-label">Games</span><span class="info-value">Roblox, PUBG</span></div>
                        <div class="info-item"><span class="info-label">Status</span><span class="info-value">Coding...</span></div>
                    </div>
                    <div class="social-links">
                        <a href="https://vynuke.com" class="social-btn">🌐 VyNuke</a>
                        <a href="https://discord.gg/vynuke" class="social-btn">💬 Discord</a>
                        <a href="https://instagram.com/" class="social-btn">📷 Instagram</a>
                    </div>
                </div>

                <div class="card-right-player">
                    <div class="vinyl-container">
                        <img src="https://i.pinimg.com/webp80/1200x/d8/b3/ee/d8b3eef2444c7d2ecff4e7eb1917f355.webp" class="vinyl-img" id="vinyl" alt="Disc">
                    </div>
                    <div class="song-name">BAND 4 BAND</div>
                    <div class="player-controls">
                        <div class="play-btn" id="play-pause">⏸️</div>
                        <div class="playback-bar" id="bar-container">
                            <div class="progress" id="progress-line"></div>
                        </div>
                        <div class="volume-box">
                            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
                        </div>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const enterBtn = document.getElementById('enter-btn');
        const introScreen = document.getElementById('intro-screen');
        const profileScreen = document.getElementById('profile-screen');
        const volumeSlider = document.getElementById('volume-slider');
        const bgm = document.getElementById('bgm');
        const playPause = document.getElementById('play-pause');
        const vinyl = document.getElementById('vinyl');
        const progressLine = document.getElementById('progress-line');
        const barContainer = document.getElementById('bar-container');

        enterBtn.addEventListener('click', () => {
            document.body.style.backgroundImage = "url('https://i.pinimg.com/originals/e1/e6/d6/e1e6d6148ec6ae3b0a2c8a3a336dcad3.gif')";
            bgm.volume = volumeSlider.value;
            bgm.play();
            vinyl.style.animationPlayState = 'running';
            
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                profileScreen.style.display = 'flex';
                void profileScreen.offsetWidth;
                profileScreen.style.opacity = '1';
            }, 500);
        });

        bgm.addEventListener('timeupdate', () => {
            if (!isNaN(bgm.duration)) {
                const pct = (bgm.currentTime / bgm.duration) * 100;
                progressLine.style.width = pct + '%';
            }
        });

        barContainer.addEventListener('click', (e) => {
            const rect = barContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            bgm.currentTime = pos * bgm.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value;
        });

        playPause.addEventListener('click', () => {
            if (bgm.paused) {
                bgm.play();
                playPause.innerText = '⏸️';
                vinyl.style.animationPlayState = 'running';
            } else {
                bgm.pause();
                playPause.innerText = '▶️';
                vinyl.style.animationPlayState = 'paused';
            }
        });
    </script>
</body>
</html>
